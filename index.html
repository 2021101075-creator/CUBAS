<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Universo Sorpresa</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
background:black;
font-family:Arial;
}

/* FONDO UNIVERSO */
.bg{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle,#1a0033,#000);
transition:3s;
}

/* ESTRELLAS */
.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:0.8;
}

/* PORTAL */
.portal{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:200px;
height:200px;
border-radius:50%;
background:radial-gradient(circle,#ff4df0,#6a00ff,#000);
box-shadow:0 0 80px #ff4df0;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
cursor:pointer;
animation:spin 5s linear infinite;
}

@keyframes spin{
from{transform:translate(-50%,-50%) rotate(0deg)}
to{transform:translate(-50%,-50%) rotate(360deg)}
}

/* ROSA */
.rosa{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
font-size:90px;
opacity:0;
transition:1s;
}

/* EXPLOSIÓN */
.explosion{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle,rgba(255,77,240,0.7),transparent);
transform:scale(0);
opacity:0;
transition:0.6s;
}

/* TEXTO FINAL */
.final{
position:absolute;
top:65%;
width:100%;
text-align:center;
color:white;
font-size:18px;
opacity:0;
transition:2s;
}

/* BOTÓN */
button{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:15px 25px;
border:none;
border-radius:20px;
background:#ff4dd2;
color:white;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="explosion" id="exp"></div>

<div class="portal" onclick="activar()">
TOCA 🌌
</div>

<div class="rosa" id="rosa">🌹</div>

<div class="final" id="final"></div>

<script>

/* CREAR ESTRELLAS */
for(let i=0;i<150;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
}

/* ACTIVAR UNIVERSO */
function activar(){

/* ocultar portal */
document.querySelector(".portal").style.opacity="0";

/* explosión */
document.getElementById("exp").style.transform="scale(1)";
document.getElementById("exp").style.opacity="1";

/* zoom universo */
document.getElementById("bg").style.transform="scale(1.2)";

/* rosa aparece */
setTimeout(()=>{
let r=document.getElementById("rosa");
r.style.transform="translate(-50%,-50%) scale(1.4)";
r.style.opacity="1";
},1000);

/* mensaje final */
setTimeout(()=>{
let f=document.getElementById("final");
f.style.opacity="1";
f.innerHTML=`
A veces el universo no pregunta…<br><br>
solo junta lo que tiene que estar junto 🌌💖
`;
},2000);

/* efecto latido */
setInterval(()=>{
document.body.style.filter="brightness(1.2)";
setTimeout(()=>{
document.body.style.filter="brightness(1)";
},200);
},900);

/* partículas románticas */
setInterval(()=>{
let c=document.createElement("div");
c.innerHTML="💖";
c.style.position="absolute";
c.style.left=Math.random()*100+"vw";
c.style.bottom="0px";
c.style.fontSize="18px";
c.style.animation="float 4s linear forwards";
document.body.appendChild(c);

setTimeout(()=>c.remove(),4000);
},200);

}

</script>

</body>
</html>
