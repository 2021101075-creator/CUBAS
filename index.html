<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Regalo</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle, #0b0b2b, #000);
  font-family:sans-serif;
}

/* ocultamos el checkbox */
#abrir{
  display:none;
}

/* caja regalo */
.caja{
  width:200px;
  height:200px;
  background: linear-gradient(145deg, #ff4d6d, #c9184a);
  position:relative;
  cursor:pointer;
  border-radius:15px;
  box-shadow:0 0 25px #ff4d6d;
  transition:0.5s;
}

/* cinta */
.caja::before{
  content:"";
  position:absolute;
  width:30px;
  height:100%;
  background:#fff;
  left:50%;
  transform:translateX(-50%);
}

/* tapa */
.caja::after{
  content:"";
  position:absolute;
  width:100%;
  height:30px;
  background:#fff;
  top:50%;
  transform:translateY(-50%);
}

/* texto inicial */
.texto{
  position:absolute;
  width:100%;
  text-align:center;
  top:80px;
  color:white;
  font-weight:bold;
  letter-spacing:1px;
}

/* contenido oculto */
.regalo{
  position:absolute;
  opacity:0;
  transform:scale(0);
  transition:1s;
  color:white;
  text-align:center;
}

/* rosa */
.rosa{
  font-size:60px;
  animation:flotar 2s infinite ease-in-out;
}

/* animación */
@keyframes flotar{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* cuando se abre */
#abrir:checked + label .caja{
  transform:scale(0.5) rotate(10deg);
  opacity:0;
}

#abrir:checked + label .regalo{
  opacity:1;
  transform:scale(1);
}
</style>
</head>

<body>

<input type="checkbox" id="abrir">

<label for="abrir">

  <div class="caja">
    <div class="texto">TOCA PARA ABRIR</div>
  </div>

  <div class="regalo">
    <div class="rosa">🌹</div>
    <h2>ME GUSTAS MUCHO</h2>
    <p>Un pequeño detalle del universo para ti ✨🌌</p>
  </div>

</label>

</body>
</html>
